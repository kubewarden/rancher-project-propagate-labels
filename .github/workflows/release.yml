on:
  push:
    branches:
    - main
    - master
    tags:
    - 'v*'

name: Release policy

jobs:

  test:
    name: run tests and linters
    uses: kubewarden/github-actions/.github/workflows/reusable-test-policy-rust.yml@acb006fafe5e4da789055f573d11cea2917de59a # v4.5.8

  release:
    needs: test
    permissions:
      # Required to create GH release
      contents: write
      # Required to push to ghcr.io
      packages: write
      # Required by cosign keyless signing
      id-token: write

    uses: kubewarden/github-actions/.github/workflows/reusable-release-policy-rust.yml@acb006fafe5e4da789055f573d11cea2917de59a # v4.5.8
    with:
      oci-target: ghcr.io/kubewarden/policies/rancher-project-propagate-labels
